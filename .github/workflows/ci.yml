name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  # APK is downloaded at runtime — the file ID matches the Google Drive
  # link given in the take-home PDF. Override via secrets/vars if needed.
  APK_GDRIVE_ID: ${{ vars.APK_GDRIVE_ID || '1dUgCO1UbBsJhyNwshT6OhKXWTjP4prPI' }}

jobs:
  # ── Task I — Web (Playwright + Chromium) ──────────────────────────────
  task-1-web:
    name: Task I — web (time.is)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: task-1-web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm', cache-dependency-path: 'task-1-web/package-lock.json' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '${{ env.JAVA_VERSION }}' }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run spec
        run: npx playwright test
      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task-1-allure
          path: task-1-web/allure-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task-1-playwright
          path: |
            task-1-web/playwright-report
            task-1-web/test-results

  # ── Task II — API (Playwright request context) ────────────────────────
  task-2-api:
    name: Task II — API (GitHub org)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: task-2-api } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm', cache-dependency-path: 'task-2-api/package-lock.json' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '${{ env.JAVA_VERSION }}' }
      - run: npm ci
      - name: Run spec
        run: npx playwright test
      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task-2-allure
          path: task-2-api/allure-report

  # ── Task III — Mobile (Appium + Android emulator) ─────────────────────
  task-3-mobile:
    name: Task III — mobile (Jitsu Driver)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: task-3-mobile } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm', cache-dependency-path: 'task-3-mobile/package-lock.json' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '${{ env.JAVA_VERSION }}' }
      - name: Enable KVM (for hardware-accelerated emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Download APK
        run: |
          mkdir -p apps
          curl -sL --fail -o apps/jitsu-driver.apk \
            "https://drive.usercontent.google.com/download?id=${APK_GDRIVE_ID}&export=download&confirm=t"
          file apps/jitsu-driver.apk
      - run: npm ci
      - name: Install Appium uiautomator2 driver
        run: |
          if npx appium driver list --installed 2>/dev/null | grep -q '^[[:space:]]*-[[:space:]]*uiautomator2'; then
            echo "uiautomator2 is already installed"
          else
            npx appium driver install uiautomator2
          fi
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-v1
      - name: Pre-create AVD (if cache miss)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_5
          avd-name: jitsu_test
          force-avd-creation: true
          emulator-options: -no-window -no-audio -no-snapshot -no-boot-anim
          disable-animations: true
          script: echo "AVD ready"
      - name: Run spec on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_5
          avd-name: jitsu_test
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-snapshot -no-boot-anim
          disable-animations: true
          script: |
            cd task-3-mobile
            nohup npx appium --base-path=/wd/hub > /tmp/appium.log 2>&1 &
            for i in {1..20}; do
              curl -s http://127.0.0.1:4723/wd/hub/status >/dev/null && break
              sleep 1
            done
            npx playwright test
      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task-3-allure
          path: task-3-mobile/allure-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: task-3-recordings
          path: task-3-mobile/recordings

  # ── Aggregate Allure reports + deploy to GitHub Pages ─────────────────
  publish-pages:
    name: Publish Allure reports to GitHub Pages
    needs: [task-1-web, task-2-api, task-3-mobile]
    if: ${{ always() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Download all task artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble site
        run: |
          mkdir -p site
          for t in task-1 task-2 task-3; do
            if [ -d "artifacts/${t}-allure" ]; then
              mv "artifacts/${t}-allure" "site/${t}"
            fi
          done
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Jitsu QA Take-Home — Allure reports</title>
            <style>
              body { font-family: -apple-system, system-ui, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1rem; line-height: 1.6; color: #222; }
              h1 { font-size: 1.4rem; }
              ul { list-style: none; padding: 0; }
              li { margin: 0.6rem 0; padding: 0.8rem 1rem; border: 1px solid #ddd; border-radius: 6px; }
              a { color: #0366d6; text-decoration: none; font-weight: 600; }
              a:hover { text-decoration: underline; }
              .meta { color: #666; font-size: 0.9rem; }
            </style>
          </head>
          <body>
            <h1>Jitsu QA Take-Home — Allure reports</h1>
            <p class="meta">Built from the latest <code>main</code> branch.</p>
            <ul>
              <li><a href="task-1/">Task I — Web (time.is)</a></li>
              <li><a href="task-2/">Task II — API (GitHub org)</a></li>
              <li><a href="task-3/">Task III — Mobile (Jitsu Driver)</a></li>
            </ul>
            <p class="meta">Source: <a href="https://github.com/tranvannhatnam97/jitsu-qa-takehome">tranvannhatnam97/jitsu-qa-takehome</a></p>
          </body>
          </html>
          HTML
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
